version: "3.9"

services:

  db:
    image: postgres:15
    container_name: insureflow-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: insureflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
         DATABASE_URL: postgresql://postgres:password@db:5432/insureflow
         REDIS_URL: redis://redis:6379/0
         SECRET_KEY: devsecret
         ALGORITHM: HS256
         ACCESS_TOKEN_EXPIRE_MINUTES: 30
         REFRESH_TOKEN_EXPIRE_DAYS: 7
    depends_on:
      - db
      - redis
    volumes:
      - .:/app


  worker:
    build: .
    command: celery -A app.core.celery worker --loglevel=info --pool=solo
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/insureflow
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: devsecret
    depends_on:
        - db
        - redis
    volumes:
      - .:/app


volumes:
  postgres_data: