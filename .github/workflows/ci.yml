name: InsureFlow CI

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: insureflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
    
      redis:
        image: redis:7
        ports:
          - 6379:6379
      
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/insureflow_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: "3.11"
      
      - name: Install Dependencies
        run:  |
            pip install -r requirement.txt
            pip install pytest flake8 httpx
      
      - name: Lint with flake8
        run: flake8 . --max-line-length=120 --exclude=alembic,venv --ignore=E231,E225,E302,E303,W391,F401,E252
      
      - name: Run tests
        run: pytest tests/ -v
  
